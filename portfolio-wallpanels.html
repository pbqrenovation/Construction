<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Wall Panels Portfolio | PBQ Renovation</title>
  <meta name="description" content="Wall panels installation projects by PBQ Renovation in Toronto GTA. See our work with 3D panels, acoustic panels, modern accent walls.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --primary:#16a34a;
      --primary-dark:#15803d;
      --dark:#0b1220;
      --light:#f8fafc;
      --muted:#64748b;
      --border:#e2e8f0;
      --radius:22px;
      --shadow-sm:0 6px 16px rgba(2,6,23,.08);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',system-ui,sans-serif;
      line-height:1.6;
      color:var(--dark);
      background:#fff;
    }
    .container{max-width:1280px;margin:0 auto;padding:0 24px}
    .page-header{
      background:var(--dark);
      color:#fff;
      padding:1rem 0;
      margin-bottom:2rem;
    }
    .page-header a{
      color:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:500;
      transition:color 0.2s;
    }
    .page-header a:hover{color:var(--primary);}
    .gallery-title{
      text-align:center;
      margin:2rem 0 1rem;
    }
    .gallery-title h1{
      font-size:2.5rem;
      font-family:'Poppins',sans-serif;
    }
    .gallery-title p{
      color:var(--muted);
      margin-top:0.5rem;
    }
    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:24px;
      margin:2rem 0 4rem;
    }
    .gallery-item{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow-sm);
      transition:transform 0.2s, box-shadow 0.2s;
      cursor:pointer;
    }
    .gallery-item:hover{
      transform:translateY(-6px);
      box-shadow:0 20px 35px rgba(0,0,0,0.1);
    }
    .gallery-item img{
      width:100%;
      height:280px;
      object-fit:cover;
      display:block;
    }
    .gallery-item .caption{
      padding:16px;
      text-align:center;
      font-weight:500;
      color:var(--muted);
    }
    footer{
      background:var(--dark);
      color:#fff;
      text-align:center;
      padding:2rem 0;
      margin-top:3rem;
    }

    /* Lightbox styles */
    .lightbox{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      z-index:9999;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .lightbox.active{
      display:flex;
    }
    .lightbox-content{
      position:relative;
      max-width:90%;
      max-height:90%;
      cursor:default;
    }
    .lightbox-content img{
      width:auto;
      max-width:100%;
      max-height:90vh;
      object-fit:contain;
      border-radius:8px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }
    .close-lightbox{
      position:absolute;
      top:-40px;
      right:0;
      color:#fff;
      font-size:2rem;
      cursor:pointer;
      transition:color 0.2s;
      background:none;
      border:none;
      padding:0;
    }
    .close-lightbox:hover{
      color:var(--primary);
    }
    .lightbox-prev, .lightbox-next{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:rgba(0,0,0,0.5);
      color:#fff;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.8rem;
      cursor:pointer;
      transition:background 0.2s;
      border:none;
    }
    .lightbox-prev:hover, .lightbox-next:hover{
      background:var(--primary);
    }
    .lightbox-prev{
      left:-70px;
    }
    .lightbox-next{
      right:-70px;
    }
    @media (max-width: 700px){
      .lightbox-prev{left:-40px; width:40px; height:40px; font-size:1.2rem;}
      .lightbox-next{right:-40px; width:40px; height:40px; font-size:1.2rem;}
      .close-lightbox{top:-30px; right:0; font-size:1.5rem;}
      .gallery-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="container">
      <a href="index.html#portfolio"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>
  </div>

  <div class="container">
    <div class="gallery-title">
      <h1>Wall Panels Installation Projects</h1>
      <p>Custom wall panels, 3D panels, modern accent walls — our recent projects in Toronto GTA.</p>
    </div>

    <div class="gallery-grid" id="galleryGrid">
      <!-- фото будут вставлены через JS -->
    </div>
  </div>

  <footer>
    <div class="container">
      <p>&copy; 2025 PBQ Renovation. All rights reserved.</p>
    </div>
  </footer>

  <!-- Lightbox structure -->
  <div class="lightbox" id="lightbox">
    <button class="close-lightbox" id="closeLightbox">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev"><i class="fas fa-chevron-left"></i></button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="">
    </div>
    <button class="lightbox-next" id="lightboxNext"><i class="fas fa-chevron-right"></i></button>
  </div>

  <script>
    // Массив с изображениями для Wall Panels
    const images = [
      { src: 'https://raw.githubusercontent.com/pbqrenovation/Construction/main/pa1.jpg', caption: 'Modern wood slat accent wall' },
      { src: 'https://raw.githubusercontent.com/pbqrenovation/Construction/main/pa2.jpg', caption: 'Geometric 3D panel installation' },
      { src: 'https://raw.githubusercontent.com/pbqrenovation/Construction/main/pa3.jpg', caption: 'Luxury wall panel finish' },
      { src: 'https://raw.githubusercontent.com/pbqrenovation/Construction/main/pa4.jpg', caption: 'Professional acoustic panel system' },
      { src: 'https://raw.githubusercontent.com/pbqrenovation/Construction/main/pa5.png', caption: 'Minimalist panel design' }
    ];

    // Генерируем галерею
    const galleryGrid = document.getElementById('galleryGrid');
    
    // Проверяем, что элементы загружаются
    images.forEach((img, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.setAttribute('data-index', index);
      
      const imageElement = document.createElement('img');
      imageElement.src = img.src;
      imageElement.alt = img.caption;
      imageElement.loading = 'lazy';
      
      // Обработка ошибки загрузки изображения
      imageElement.onerror = function() {
        console.error('Image failed to load:', img.src);
        this.src = 'https://via.placeholder.com/400x300?text=Image+Loading...';
      };
      
      const captionDiv = document.createElement('div');
      captionDiv.className = 'caption';
      captionDiv.textContent = img.caption;
      
      item.appendChild(imageElement);
      item.appendChild(captionDiv);
      item.addEventListener('click', () => openLightbox(index));
      galleryGrid.appendChild(item);
    });

    // Lightbox элементы
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeLightbox = document.getElementById('closeLightbox');
    const prevBtn = document.getElementById('lightboxPrev');
    const nextBtn = document.getElementById('lightboxNext');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      updateLightboxImage();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function updateLightboxImage() {
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].caption;
    }

    function closeLightboxFunc() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateLightboxImage();
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      updateLightboxImage();
    }

    closeLightbox.addEventListener('click', closeLightboxFunc);
    prevBtn.addEventListener('click', showPrev);
    nextBtn.addEventListener('click', showNext);

    // Закрытие при клике на фон (вне изображения)
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightboxFunc();
    });

    // Клавиатурная навигация
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightboxFunc();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
    
    // Проверка загрузки страницы
    console.log('Wall Panels portfolio page loaded');
    console.log('Images count:', images.length);
  </script>
</body>
</html>
